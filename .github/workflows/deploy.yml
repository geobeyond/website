# Build the Astro site and deploy it to GitHub Pages.
# NOTE: in the repo Settings → Pages, set "Build and deployment → Source" to
# "GitHub Actions" once, otherwise this workflow has nowhere to publish.
name: Deploy site

on:
  push:
    branches:
      - main
      - claude/geobeyond-redesign-bp9txe # draft preview branch
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Project Pages site lives under /website. If a custom domain is
          # attached later, set SITE_BASE to "/" and SITE_URL accordingly.
          SITE_BASE: /website
          SITE_URL: https://geobeyond.github.io
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
